<!-- Firebase SDKs -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
  import { getAnalytics } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-analytics.js";
  import { getDatabase, ref, set, get, child, update, remove, onValue } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-database.js";
  import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js";

  // Firebase configuration
  const firebaseConfig = {
    apiKey: "AIzaSyAGsae6dtciS39xRnOxg13OWkg44B8GPHU",
    authDomain: "raghay-litaamir.firebaseapp.com",
    projectId: "raghay-litaamir",
    storageBucket: "raghay-litaamir.firebasestorage.app",
    messagingSenderId: "931657612725",
    appId: "1:931657612725:web:01e01c66299353f1752dfc",
    measurementId: "G-YMBZ8FZ1QJ",
    databaseURL: "https://raghay-litaamir-default-rtdb.firebaseio.com/"
  };

  // Initialize Firebase
  const app = initializeApp(firebaseConfig);
  const analytics = getAnalytics(app);
  const db = getDatabase(app);
  const auth = getAuth(app);

  // Expose Firebase services globally
  window.firebaseDB = db;
  window.firebaseAuth = auth;
  window.firebaseRef = ref;
  window.firebaseGet = get;
  window.firebaseSet = set;
  window.firebaseUpdate = update;
  window.firebaseRemove = remove;
  window.firebaseOnValue = onValue;
  window.firebaseChild = child;
  window.firebaseSignIn = signInWithEmailAndPassword;
  window.firebaseCreateUser = createUserWithEmailAndPassword;
  window.firebaseSignOut = signOut;
  window.firebaseOnAuthStateChanged = onAuthStateChanged;

  // Signal that Firebase is ready
  window.firebaseReady = true;
  window.dispatchEvent(new Event('firebase-ready'));
</script>

<style>
/* ============================================================
   RAGHAY LITAAMIR BTP — Design System
   ============================================================ */

:root[data-theme="dark"] {
  --bg-primary: #0F1419;
  --bg-secondary: #1A1F2E;
  --bg-tertiary: #242B3D;
  --bg-elevated: #2D3548;

  --border-light: #3A435A;
  --text-primary: #F5F6FA;
  --text-secondary: #8B92A8;
  --text-muted: #5D6578;
  --shadow: 0 4px 20px rgba(0,0,0,0.4);

  --blueprint-grid: rgba(255,107,0,0.04);
}

:root[data-theme="light"] {
  --bg-primary: #F5F6F8;
  --bg-secondary: #FFFFFF;
  --bg-tertiary: #F1F3F5;
  --bg-elevated: #FFFFFF;
  --border: #E1E5EA;
  --border-light: #CFD4DB;
  --text-primary: #1A1F2E;
  --text-secondary: #5D6578;
  --text-muted: #8B92A8;
  --shadow: 0 2px 12px rgba(15,20,25,0.08);
  --shadow-lg: 0 8px 32px rgba(15,20,25,0.12);
  --glow-orange: 0 0 20px rgba(255,107,0,0.25);
  --blueprint-grid: rgba(255,107,0,0.025);
}

:root {
  --accent: #FF6B00;
  --accent-hover: #FF8533;
  --accent-dark: #CC5500;
  --hazard: #FFC107;
  --hazard-dark: #FFA000;
  --success: #10B981;
  --warning: #F59E0B;
  --danger: #EF4444;
  --info: #3B82F6;
  --font-display: 'Bebas Neue', 'Arial Black', sans-serif;
  --font-body: 'Rubik', -apple-system, sans-serif;
  --font-mono: 'JetBrains Mono', 'Courier New', monospace;
  --radius-sm: 4px;
  --radius: 8px;
  --radius-lg: 12px;
  --sidebar-w: 260px;
  --header-h: 64px;
  --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
  font-family: var(--font-body);
  background: var(--bg-primary);
  color: var(--text-primary);
  font-size: 14px;
  line-height: 1.5;
  min-height: 100vh;
  overflow-x: hidden;
  transition: background var(--transition), color var(--transition);
  background-image: linear-gradient(var(--blueprint-grid) 1px, transparent 1px), linear-gradient(90deg, var(--blueprint-grid) 1px, transparent 1px);
  background-size: 40px 40px;
}
::selection { background: var(--accent); color: #fff; }
::-webkit-scrollbar { width: 10px; height: 10px; }
::-webkit-scrollbar-track { background: var(--bg-secondary); }
::-webkit-scrollbar-thumb { background: var(--border-light); border-radius: 5px; }
::-webkit-scrollbar-thumb:hover { background: var(--accent); }

/* LOGIN */
#loginScreen {
  position: fixed; inset: 0;
  display: flex; align-items: center; justify-content: center;
  background: var(--bg-primary);
  z-index: 1000; padding: 20px;
}
#loginScreen::before {
  content: '';
  position: absolute; inset: 0;
  background: radial-gradient(circle at 20% 50%, rgba(255,107,0,0.15), transparent 40%), radial-gradient(circle at 80% 80%, rgba(255,193,7,0.08), transparent 40%);
  pointer-events: none;
}
.hazard-stripe {
  height: 16px;
  background: repeating-linear-gradient(-45deg, #FFC107 0 24px, #1A1F2E 24px 48px);
  box-shadow: 0 2px 8px rgba(0,0,0,0.3);
}
.login-box {
  width: 100%; max-width: 440px;
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  overflow: hidden;
  box-shadow: var(--shadow-lg);
  position: relative; z-index: 1;
  animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
}
@keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
.login-header {
  padding: 40px 32px 24px;
  text-align: center;
  background: linear-gradient(135deg, var(--bg-tertiary) 0%, var(--bg-secondary) 100%);
  border-bottom: 1px solid var(--border);
}
.logo-mark {
  width: 72px; height: 72px;
  margin: 0 auto 16px;
  background: linear-gradient(135deg, var(--accent) 0%, var(--hazard) 100%);
  border-radius: var(--radius-lg);
  display: flex; align-items: center; justify-content: center;
  font-size: 36px;
  box-shadow: var(--glow-orange);
  transform: rotate(-3deg);
}
.brand-title { font-family: var(--font-display); font-size: 28px; letter-spacing: 2px; color: var(--text-primary); line-height: 1; margin-bottom: 4px; }
.brand-subtitle { font-size: 11px; letter-spacing: 3px; color: var(--accent); font-weight: 600; text-transform: uppercase; }
.login-body { padding: 32px; }
.form-group { margin-bottom: 18px; }
.form-label {
  display: block;
  font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase;
  color: var(--text-secondary); margin-bottom: 8px; font-weight: 600;
}
.form-control {
  width: 100%; padding: 12px 14px;
  background: var(--bg-primary);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text-primary);
  font-family: var(--font-body); font-size: 14px;
  transition: all var(--transition);
}
.form-control:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(255,107,0,0.15); }
.form-control::placeholder { color: var(--text-muted); }
select.form-control { cursor: pointer; }
textarea.form-control { resize: vertical; min-height: 80px; }
.btn {
  display: inline-flex; align-items: center; justify-content: center;
  gap: 8px; padding: 12px 20px;
  border: none; border-radius: var(--radius);
  font-family: var(--font-body); font-weight: 600; font-size: 13px; letter-spacing: 0.5px;
  cursor: pointer; transition: all var(--transition);
  text-transform: uppercase; white-space: nowrap;
}
.btn-primary { background: linear-gradient(135deg, var(--accent) 0%, var(--accent-dark) 100%); color: #fff; box-shadow: 0 4px 14px rgba(255,107,0,0.3); }
.btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(255,107,0,0.45); }
.btn-secondary { background: var(--bg-tertiary); color: var(--text-primary); border: 1px solid var(--border); }
.btn-secondary:hover { background: var(--bg-elevated); border-color: var(--accent); }
.btn-danger { background: var(--danger); color: #fff; }
.btn-danger:hover { background: #DC2626; transform: translateY(-1px); }
.btn-success { background: var(--success); color: #fff; }
.btn-sm { padding: 6px 12px; font-size: 11px; }
.btn-block { width: 100%; }
.login-footer { padding: 16px 32px; background: var(--bg-tertiary); border-top: 1px solid var(--border); font-size: 11px; color: var(--text-muted); text-align: center; letter-spacing: 0.5px; }
.login-hint {
  margin-top: 14px; padding: 10px 12px;
  background: rgba(255,107,0,0.08);
  border: 1px dashed rgba(255,107,0,0.3);
  border-radius: var(--radius);
  font-size: 11px; color: var(--text-secondary);
  font-family: var(--font-mono); line-height: 1.6;
}
.sync-status {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: 11px;
  padding: 4px 10px;
  background: rgba(16,185,129,0.15);
  border-radius: 20px;
  color: var(--success);
}
.sync-status.syncing { background: rgba(245,158,11,0.15); color: var(--warning); }
.sync-status.error { background: rgba(239,68,68,0.15); color: var(--danger); }

/* APP SHELL */
#app { display: none; min-height: 100vh; }
#app.active { display: block; }
.sidebar {
  position: fixed; left: 0; top: 0; bottom: 0;
  width: var(--sidebar-w);
  background: var(--bg-secondary);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  z-index: 100;
  transition: transform var(--transition);
}
.sidebar-header { padding: 20px 20px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; }
.sidebar-logo {
  width: 40px; height: 40px;
  background: linear-gradient(135deg, var(--accent), var(--hazard));
  border-radius: var(--radius);
  display: flex; align-items: center; justify-content: center;
  font-size: 20px; flex-shrink: 0;
  box-shadow: var(--glow-orange);
}
.sidebar-brand { font-family: var(--font-display); font-size: 18px; letter-spacing: 1.5px; line-height: 1; color: var(--text-primary); }
.sidebar-brand small { display: block; font-family: var(--font-body); font-size: 9px; letter-spacing: 2px; color: var(--accent); font-weight: 700; margin-top: 3px; }
.sidebar-nav { flex: 1; padding: 16px 12px; overflow-y: auto; }
.nav-section-title { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--text-muted); padding: 12px 12px 6px; font-weight: 700; }
.nav-item {
  display: flex; align-items: center; gap: 12px;
  padding: 11px 14px;
  color: var(--text-secondary);
  border-radius: var(--radius);
  cursor: pointer; font-size: 13px; font-weight: 500;
  transition: all var(--transition);
  margin-bottom: 2px;
  border-left: 3px solid transparent;
}
.nav-item:hover { background: var(--bg-tertiary); color: var(--text-primary); }
.nav-item.active {
  background: linear-gradient(90deg, rgba(255,107,0,0.15), transparent);
  color: var(--accent);
  border-left-color: var(--accent);
  font-weight: 600;
}
.nav-icon { font-size: 18px; width: 24px; text-align: center; }
.nav-badge { margin-left: auto; background: var(--accent); color: #fff; font-size: 10px; padding: 2px 7px; border-radius: 10px; font-weight: 700; }
.sidebar-footer { padding: 14px; border-top: 1px solid var(--border); background: var(--bg-tertiary); }
.user-chip { display: flex; align-items: center; gap: 10px; padding: 8px; border-radius: var(--radius); }
.user-avatar {
  width: 36px; height: 36px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--accent), var(--hazard));
  display: flex; align-items: center; justify-content: center;
  font-weight: 700; color: #fff; font-size: 14px; flex-shrink: 0;
}
.user-info { flex: 1; min-width: 0; }
.user-name { font-weight: 600; font-size: 13px; color: var(--text-primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.user-role { font-size: 10px; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; font-weight: 700; }

/* MAIN */
.main { margin-left: var(--sidebar-w); min-height: 100vh; display: flex; flex-direction: column; }
.topbar {
  height: var(--header-h);
  background: var(--bg-secondary);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center;
  padding: 0 24px; gap: 16px;
  position: sticky; top: 0; z-index: 50;
  backdrop-filter: blur(8px);
}
.topbar-title { font-family: var(--font-display); font-size: 24px; letter-spacing: 2px; flex: 1; display: flex; align-items: center; gap: 14px; }
.topbar-title::before { content: ''; width: 4px; height: 24px; background: var(--accent); border-radius: 2px; }
.topbar-actions { display: flex; align-items: center; gap: 10px; }
.icon-btn {
  width: 38px; height: 38px;
  border-radius: var(--radius);
  background: var(--bg-tertiary);
  border: 1px solid var(--border);
  color: var(--text-secondary);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px;
  transition: all var(--transition);
}
.icon-btn:hover { background: var(--accent); color: #fff; border-color: var(--accent); transform: translateY(-2px); }
.content { flex: 1; padding: 24px; max-width: 1600px; width: 100%; margin: 0 auto; }

/* CARDS */
.card { background: var(--bg-secondary); border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; margin-bottom: 20px; }
.card-header { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; gap: 12px; flex-wrap: wrap; }
.card-title { font-family: var(--font-display); font-size: 18px; letter-spacing: 1.5px; display: flex; align-items: center; gap: 10px; }
.card-body { padding: 20px; }
.card-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 16px; }
.toolbar { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; margin-bottom: 16px; }
.search-box { flex: 1; min-width: 200px; position: relative; }
.search-box input {
  width: 100%; padding: 10px 14px 10px 38px;
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text-primary);
  font-family: var(--font-body); font-size: 13px;
  transition: all var(--transition);
}
.search-box input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(255,107,0,0.15); }
.search-box::before { content: '🔍'; position: absolute; left: 12px; top: 50%; transform: translateY(-50%); font-size: 13px; opacity: 0.6; }
.data-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.data-table th {
  background: var(--bg-tertiary);
  padding: 12px 14px; text-align: left;
  font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase;
  color: var(--text-secondary); font-weight: 700;
  border-bottom: 2px solid var(--accent);
  white-space: nowrap;
}
.data-table td { padding: 12px 14px; border-bottom: 1px solid var(--border); color: var(--text-primary); vertical-align: middle; }
.data-table tbody tr { transition: background var(--transition); }
.data-table tbody tr:hover { background: var(--bg-tertiary); }
.data-table .actions { display: flex; gap: 6px; justify-content: flex-end; }
.action-btn {
  width: 30px; height: 30px;
  background: var(--bg-tertiary);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  cursor: pointer;
  display: inline-flex; align-items: center; justify-content: center;
  font-size: 13px;
  transition: all var(--transition);
  color: var(--text-secondary);
}
.action-btn:hover { background: var(--accent); color: #fff; border-color: var(--accent); transform: translateY(-1px); }
.action-btn.danger:hover { background: var(--danger); border-color: var(--danger); }
.table-wrap { overflow-x: auto; border-radius: var(--radius-lg); }

/* BADGES */
.badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 10px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; border: 1px solid transparent; }
.badge-success { background: rgba(16,185,129,0.15); color: var(--success); border-color: rgba(16,185,129,0.3); }
.badge-warning { background: rgba(245,158,11,0.15); color: var(--warning); border-color: rgba(245,158,11,0.3); }
.badge-danger  { background: rgba(239,68,68,0.15); color: var(--danger); border-color: rgba(239,68,68,0.3); }
.badge-info    { background: rgba(59,130,246,0.15); color: var(--info); border-color: rgba(59,130,246,0.3); }
.badge-accent  { background: rgba(255,107,0,0.15); color: var(--accent); border-color: rgba(255,107,0,0.3); }
.badge-neutral { background: var(--bg-tertiary); color: var(--text-secondary); border-color: var(--border); }

/* PROGRESS */
.progress { height: 8px; background: var(--bg-tertiary); border-radius: 4px; overflow: hidden; position: relative; }
.progress-bar { height: 100%; background: linear-gradient(90deg, var(--accent), var(--hazard)); transition: width 0.6s cubic-bezier(0.16, 1, 0.3, 1); border-radius: 4px; }

/* EMPTY */
.empty { text-align: center; padding: 60px 20px; color: var(--text-muted); }
.empty-icon { font-size: 56px; opacity: 0.4; margin-bottom: 12px; }
.empty-title { font-family: var(--font-display); font-size: 20px; letter-spacing: 1.5px; color: var(--text-secondary); margin-bottom: 6px; }

/* MODAL */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(6px);
  display: none;
  align-items: center; justify-content: center;
  z-index: 200; padding: 20px;
  animation: fadeIn 0.2s;
}
.modal-overlay.active { display: flex; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
.modal {
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  width: 100%; max-width: 640px;
  max-height: 90vh;
  display: flex; flex-direction: column;
  box-shadow: var(--shadow-lg);
  animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1);
  overflow: hidden;
}
.modal-lg { max-width: 900px; }
.modal-xl { max-width: 1100px; }
.modal-header { padding: 18px 22px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; background: linear-gradient(135deg, var(--bg-tertiary), var(--bg-secondary)); }
.modal-title { font-family: var(--font-display); font-size: 20px; letter-spacing: 1.5px; }
.modal-close { width: 32px; height: 32px; border-radius: var(--radius-sm); background: transparent; border: none; cursor: pointer; color: var(--text-secondary); font-size: 20px; transition: all var(--transition); }
.modal-close:hover { background: var(--danger); color: #fff; }
.modal-body { padding: 22px; overflow-y: auto; flex: 1; }
.modal-footer { padding: 14px 22px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 10px; background: var(--bg-tertiary); }
.form-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 14px; }

/* TOAST */
#toastContainer { position: fixed; bottom: 24px; right: 24px; z-index: 500; display: flex; flex-direction: column; gap: 10px; pointer-events: none; }
.toast {
  min-width: 280px; max-width: 380px;
  padding: 14px 18px;
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  border-left: 4px solid var(--accent);
  border-radius: var(--radius);
  box-shadow: var(--shadow-lg);
  color: var(--text-primary);
  font-size: 13px;
  animation: slideInRight 0.35s cubic-bezier(0.16, 1, 0.3, 1);
  pointer-events: all;
  display: flex; align-items: center; gap: 12px;
}
.toast.success { border-left-color: var(--success); }
.toast.error   { border-left-color: var(--danger); }
.toast.warning { border-left-color: var(--warning); }
.toast-icon { font-size: 20px; }
@keyframes slideInRight { from { transform: translateX(120%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

/* CALENDAR */
.calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; }
.calendar-day-name { text-align: center; font-size: 10px; letter-spacing: 1.5px; color: var(--text-muted); font-weight: 700; padding: 8px 0; text-transform: uppercase; }
.calendar-cell {
  aspect-ratio: 1;
  background: var(--bg-tertiary);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 6px;
  cursor: pointer;
  transition: all var(--transition);
  display: flex; flex-direction: column;
  font-size: 12px;
  min-height: 60px;
  position: relative;
}
.calendar-cell:hover { border-color: var(--accent); background: var(--bg-elevated); }
.calendar-cell.other-month { opacity: 0.3; }
.calendar-cell.today { border-color: var(--accent); background: rgba(255,107,0,0.1); }
.calendar-cell.has-event { border-color: var(--hazard); }
.calendar-num { font-weight: 700; font-size: 13px; }
