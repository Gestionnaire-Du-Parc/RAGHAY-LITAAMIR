<script>
// ============================================================
// APPLICATION PRINCIPALE
// ============================================================

let currentUser = null;
let currentModule = 'dashboard';
let appState = {
  chantiers: [],
  stock: [],
  consoHeures: [],
  consoCarburant: [],
  consoMateriaux: []
};

// Données par défaut
const DEFAULT_CHANTIERS = [
  { id: "1", code: 'CH-001', nom: 'Construction École Privée', budget: 100000, avancement: 35, status: 'en_cours', client: 'Ministère Éducation' },
  { id: "2", code: 'CH-002', nom: 'Villa Palmeraie', budget: 2800000, avancement: 30, status: 'en_cours', client: 'M. Tazi' }
];

const DEFAULT_STOCK = [
  { id: "1", code: 'CIM-001', designation: 'Ciment CPJ 45', quantite: 450, unite: 'sac', prixUnitaire: 85, seuilAlerte: 100 },
  { id: "2", code: 'FER-001', designation: 'Fer à béton Ø12', quantite: 280, unite: 'barre', prixUnitaire: 95, seuilAlerte: 50 }
];

// Utilitaires
function toast(msg, type = 'success') {
  const container = document.getElementById('toastContainer');
  const toast = document.createElement('div');
  toast.className = 'toast';
  toast.innerHTML = `<span>${type === 'success' ? '✅' : type === 'error' ? '❌' : '⚠️'}</span> ${msg}`;
  container.appendChild(toast);
  setTimeout(() => toast.remove(), 3000);
}

function fmtMAD(n) {
  return new Intl.NumberFormat('fr-FR').format(n || 0) + ' MAD';
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('active');
}

// Charger depuis Firestore
async function loadFromFirestore(collectionName) {
  if (!window.firebaseReady || !window.db) return [];
  try {
    const colRef = collection(window.db, collectionName);
    const snapshot = await getDocs(colRef);
    const items = [];
    snapshot.forEach(doc => {
      items.push({ id: doc.id, ...doc.data() });
    });
    appState[collectionName] = items;
    return items;
  } catch (error) {
    console.error(`Error loading ${collectionName}:`, error);
    return [];
  }
}

async function saveToFirestore(collectionName, data) {
  if (!window.firebaseReady || !window.db) return false;
  try {
    const docRef = doc(window.db, collectionName, data.id || Date.now().toString());
    await setDoc(docRef, { ...data, id: data.id || docRef.id });
    await loadFromFirestore(collectionName);
    return true;
  } catch (error) {
    console.error('Save error:', error);
    toast('Erreur sauvegarde', 'error');
    return false;
  }
}

// Calcul budget
function calculerCoutReelChantier(chantierId) {
  const heures = (appState.consoHeures || []).filter(c => c.chantierId === chantierId).reduce((s, c) => s + (c.cout || 0), 0);
  const carburant = (appState.consoCarburant || []).filter(c => c.chantierId === chantierId).reduce((s, c) => s + (c.cout || 0), 0);
  const materiaux = (appState.consoMateriaux || []).filter(c => c.chantierId === chantierId).reduce((s, c) => s + (c.cout || 0), 0);
  return { total: heures + carburant + materiaux, heures, carburant, materiaux };
}

// Navigation
async function navigate(module) {
  currentModule = module;
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  event?.target?.closest('.nav-item')?.classList.add('active');
  
  const titles = { dashboard: 'TABLEAU DE BORD', chantiers: 'CHANTIERS', stock: 'STOCK' };
  document.getElementById('topbarTitle').textContent = titles[module] || 'DASHBOARD';
  
  if (module === 'dashboard') {
    await loadFromFirestore('chantiers');
    await loadFromFirestore('consoHeures');
    await loadFromFirestore('consoCarburant');
    await loadFromFirestore('consoMateriaux');
    
    let budgetTotal = 0, consommeTotal = 0;
    appState.chantiers.forEach(c => {
      const cout = calculerCoutReelChantier(c.id);
      budgetTotal += c.budget;
      consommeTotal += cout.total;
    });
    
    document.getElementById('content').innerHTML = `
      <div class="kpi-grid">
        <div class="kpi-card">
          <div class="kpi-label">CHANTIERS ACTIFS</div>
          <div class="kpi-value">${appState.chantiers.filter(c => c.status === 'en_cours').length}</div>
        </div>
        <div class="kpi-card">
          <div class="kpi-label">BUDGET TOTAL</div>
          <div class="kpi-value">${fmtMAD(budgetTotal)}</div>
        </div>
        <div class="kpi-card ${consommeTotal/budgetTotal >= 0.95 ? 'danger' : (consommeTotal/budgetTotal >= 0.8 ? 'warning' : '')}">
          <div class="kpi-label">CONSOMMÉ</div>
          <div class="kpi-value">${((consommeTotal/budgetTotal)*100).toFixed(0)}%</div>
        </div>
      </div>
      <div class="card">
        <div class="card-header"><div class="card-title">🏗️ SUIVI BUDGÉTAIRE DES CHANTIERS</div></div>
        ${appState.chantiers.map(c => {
          const cout = calculerCoutReelChantier(c.id);
          const pourcentage = (cout.total / c.budget) * 100;
          let statusClass = '', statusMsg = '';
          if (pourcentage >= 95) { statusClass = 'text-danger'; statusMsg = '⚠️ Budget critique !'; }
          else if (pourcentage >= 80) { statusClass = 'text-warning'; statusMsg = '⚠️ Alerte budget'; }
          else { statusClass = 'text-success'; statusMsg = '✅ Budget maîtrisé'; }
          
          return `<div style="margin-bottom: 20px; padding: 16px; border: 1px solid var(--border); border-radius: 12px;">
            <div class="flex justify-between items-center">
              <div><strong>${c.nom}</strong><br><small class="text-sm">${c.client}</small></div>
              <div class="text-right"><span class="${statusClass} font-bold">${pourcentage.toFixed(1)}%</span><br><small>${fmtMAD(cout.total)} / ${fmtMAD(c.budget)}</small></div>
            </div>
            <div class="progress"><div class="progress-bar" style="width: ${Math.min(100, pourcentage)}%; background: ${pourcentage>=95?'#EF4444':(pourcentage>=80?'#F59E0B':'#10B981')}"></div></div>
            <div class="flex justify-between mt-2 text-sm">
              <span>👷 Main d'œuvre: ${fmtMAD(cout.heures)}</span>
              <span>⛽ Carburant: ${fmtMAD(cout.carburant)}</span>
              <span>📦 Matériaux: ${fmtMAD(cout.materiaux)}</span>
            </div>
            <div class="${statusClass} text-sm mt-2">${statusMsg}</div>
            <button class="btn btn-secondary mt-2" style="width: auto; padding: 8px 16px;" onclick="openBudgetModal('${c.id}')">💰 Ajouter consommation</button>
          </div>`;
        }).join('')}
      </div>
    `;
  } 
  else if (module === 'chantiers') {
    await loadFromFirestore('chantiers');
    document.getElementById('content').innerHTML = `
      <div class="card-grid" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 16px;">
        ${appState.chantiers.map(c => `
          <div class="card">
            <div><strong>${c.nom}</strong></div>
            <div class="text-sm mt-2">Client: ${c.client}</div>
            <div class="text-sm">Budget: ${fmtMAD(c.budget)}</div>
            <div class="text-sm">Avancement: ${c.avancement}%</div>
            <div class="progress"><div class="progress-bar" style="width: ${c.avancement}%"></div></div>
          </div>
        `).join('')}
      </div>
    `;
  }
  else if (module === 'stock') {
    await loadFromFirestore('stock');
    document.getElementById('content').innerHTML = `
      <div class="card-grid" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 16px;">
        ${appState.stock.map(s => `
          <div class="card">
            <div><strong>${s.designation}</strong></div>
            <div class="text-sm mt-2">Code: ${s.code}</div>
            <div class="text-sm">Quantité: ${s.quantite} ${s.unite}</div>
            <div class="text-sm">Prix unitaire: ${fmtMAD(s.prixUnitaire)}</div>
            <div class="${s.quantite <= s.seuilAlerte ? 'text-danger' : 'text-success'} text-sm">Seuil alerte: ${s.seuilAlerte}</div>
          </div>
        `).join('')}
      </div>
    `;
  }
}

// Modal d'ajout de consommation
window.openBudgetModal = (chantierId) => {
  const chantier = appState.chantiers.find(c => c.id === chantierId);
  const body = `
    <div class="mb-3"><strong>${chantier?.nom}</strong><br>Budget: ${fmtMAD(chantier?.budget)}</div>
    <div class="form-group">
      <label class="form-label">👷 Heures main d'œuvre</label>
      <input type="number" id="heuresInput" class="form-control" placeholder="Nombre d'heures" step="0.5">
      <input type="number" id="tauxInput" class="form-control mt-2" placeholder="Taux horaire (MAD)" value="50">
      <button class="btn btn-primary w-full mt-2" onclick="addHeures('${chantierId}')">Ajouter heures</button>
    </div>
    <div class="form-group mt-3">
      <label class="form-label">⛽ Carburant</label>
      <input type="number" id="litresInput" class="form-control" placeholder="Litres" step="0.1">
      <input type="number" id="prixInput" class="form-control mt-2" placeholder="Prix/L (MAD)" value="15">
      <button class="btn btn-primary w-full mt-2" onclick="addCarburant('${chantierId}')">Ajouter carburant</button>
    </div>
    <div class="form-group mt-3">
      <label class="form-label">📦 Matériaux</label>
      <select id="articleSelect" class="form-control">
        <option value="">-- Sélectionner --</option>
        ${appState.stock.map(a => `<option value="${a.id}" data-prix="${a.prixUnitaire}" data-unite="${a.unite}" data-qte="${a.quantite}">${a.designation} (${a.quantite} ${a.unite})</option>`).join('')}
      </select>
      <input type="number" id="qteInput" class="form-control mt-2" placeholder="Quantité" step="0.01">
      <button class="btn btn-primary w-full mt-2" onclick="addMateriaux('${chantierId}')">Consommer matériaux</button>
    </div>
  `;
  document.getElementById('modalTitle').textContent = 'Ajouter consommation';
  document.getElementById('modalBody').innerHTML = body;
  document.getElementById('modalFooter').innerHTML = '<button class="btn btn-secondary" onclick="closeModal()">Fermer</button>';
  document.getElementById('modalOverlay').classList.add('active');
};

window.addHeures = async (chantierId) => {
  const heures = parseFloat(document.getElementById('heuresInput')?.value);
  const taux = parseFloat(document.getElementById('tauxInput')?.value);
  if (!heures || heures <= 0) { toast('Entrez un nombre d\'heures valide', 'error'); return; }
  const cout = heures * taux;
  const newConso = { id: Date.now().toString(), chantierId, heures, taux, cout, date: new Date().toISOString() };
  await saveToFirestore('consoHeures', newConso);
  toast(`Heures ajoutées: ${heures}h - ${fmtMAD(cout)}`, 'success');
  closeModal();
  await navigate('dashboard');
};

window.addCarburant = async (chantierId) => {
  const litres = parseFloat(document.getElementById('litresInput')?.value);
  const prix = parseFloat(document.getElementById('prixInput')?.value);
  if (!litres || litres <= 0) { toast('Entrez un nombre de litres valide', 'error'); return; }
  const cout = litres * prix;
  const newConso = { id: Date.now().toString(), chantierId, litres, prix, cout, date: new Date().toISOString() };
  await saveToFirestore('consoCarburant', newConso);
  toast(`Carburant ajouté: ${litres}L - ${fmtMAD(cout)}`, 'success');
  closeModal();
  await navigate('dashboard');
};

window.addMateriaux = async (chantierId) => {
  const select = document.getElementById('articleSelect');
  const articleId = select.value;
  const quantite = parseFloat(document.getElementById('qteInput')?.value);
  if (!articleId || !quantite) { toast('Sélectionnez un article et une quantité', 'error'); return; }
  const article = appState.stock.find(a => a.id === articleId);
  if (!article || quantite > article.quantite) { toast('Stock insuffisant', 'error'); return; }
  const cout = quantite * article.prixUnitaire;
  article.quantite -= quantite;
  await saveToFirestore('stock', article);
  const newConso = { id: Date.now().toString(), chantierId, articleId, quantite, cout, date: new Date().toISOString() };
  await saveToFirestore('consoMateriaux', newConso);
  toast(`Matériaux consommés: ${quantite} ${article.unite} - ${fmtMAD(cout)}`, 'success');
  closeModal();
  await navigate('dashboard');
};

// Initialisation des données par défaut
async function initDefaultData() {
  if (!window.firebaseReady) return;
  const chantiers = await loadFromFirestore('chantiers');
  if (chantiers.length === 0) {
    for (let c of DEFAULT_CHANTIERS) await saveToFirestore('chantiers', c);
  }
  const stock = await loadFromFirestore('stock');
  if (stock.length === 0) {
    for (let s of DEFAULT_STOCK) await saveToFirestore('stock', s);
  }
}

// Authentification
async function login(email, password) {
  if (!window.firebaseReady || !window.signInWithEmailAndPassword) {
    toast('Firebase non initialisé', 'error');
    return false;
  }
  try {
    const userCredential = await window.signInWithEmailAndPassword(window.auth, email, password);
    currentUser = { email: userCredential.user.email, uid: userCredential.user.uid };
    await initDefaultData();
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('app').classList.add('active');
    document.getElementById('userName').textContent = email.split('@')[0];
    document.getElementById('userRole').textContent = 'Administrateur';
    toast(`Bienvenue ${email.split('@')[0]}`, 'success');
    await navigate('dashboard');
    return true;
  } catch (error) {
    toast('Email ou mot de passe incorrect', 'error');
    return false;
  }
}

window.logout = async () => {
  if (window.signOut) await window.signOut(window.auth);
  currentUser = null;
  document.getElementById('app').classList.remove('active');
  document.getElementById('loginScreen').style.display = 'flex';
};

window.exportData = () => {
  const data = JSON.stringify(appState, null, 2);
  const blob = new Blob([data], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `raghay_backup_${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
  toast('Données exportées', 'success');
};

// Thème
function toggleTheme() {
  const current = document.documentElement.getAttribute('data-theme') || 'dark';
  const newTheme = current === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', newTheme);
  localStorage.setItem('theme', newTheme);
  document.getElementById('themeToggle').textContent = newTheme === 'dark' ? '🌙' : '☀️';
}

// Écouter Firebase
window.addEventListener('load', () => {
  const savedTheme = localStorage.getItem('theme') || 'dark';
  document.documentElement.setAttribute('data-theme', savedTheme);
  document.getElementById('themeToggle').textContent = savedTheme === 'dark' ? '🌙' : '☀️';
  
  // Attendre Firebase
  const checkFirebase = setInterval(() => {
    if (window.firebaseReady) {
      clearInterval(checkFirebase);
      console.log('Firebase ready');
    }
  }, 500);
});

// Login form
document.getElementById('loginForm').addEventListener('submit', (e) => {
  e.preventDefault();
  const email = document.getElementById('loginEmail').value;
  const password = document.getElementById('loginPassword').value;
  login(email, password);
});

// Exposer globalement
window.navigate = navigate;
window.closeModal = closeModal;
window.addHeures = addHeures;
window.addCarburant = addCarburant;
window.addMateriaux = addMateriaux;
window.openBudgetModal = openBudgetModal;
window.toggleTheme = toggleTheme;
</script>
</body>
</html>
