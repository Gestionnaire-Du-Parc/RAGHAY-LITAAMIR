<!-- Firebase SDKs pour Firestore -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
  import { getAnalytics } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-analytics.js";
  import { getFirestore, collection, doc, getDocs, getDoc, setDoc, updateDoc, deleteDoc, query, where, onSnapshot } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";
  import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js";

  // Firebase configuration
  const firebaseConfig = {
    apiKey: "AIzaSyAGsae6dtciS39xRnOxg13OWkg44B8GPHU",
    authDomain: "raghay-litaamir.firebaseapp.com",
    projectId: "raghay-litaamir",
    storageBucket: "raghay-litaamir.firebasestorage.app",
    messagingSenderId: "931657612725",
    appId: "1:931657612725:web:01e01c66299353f1752dfc",
    measurementId: "G-YMBZ8FZ1QJ"
  };

  // Initialize Firebase
  const app = initializeApp(firebaseConfig);
  const analytics = getAnalytics(app);
  const db = getFirestore(app);
  const auth = getAuth(app);

  // Expose Firebase services globally
  window.firestore = db;
  window.firebaseAuth = auth;
  window.firestoreCollection = collection;
  window.firestoreDoc = doc;
  window.firestoreGetDocs = getDocs;
  window.firestoreGetDoc = getDoc;
  window.firestoreSetDoc = setDoc;
  window.firestoreUpdateDoc = updateDoc;
  window.firestoreDeleteDoc = deleteDoc;
  window.firestoreQuery = query;
  window.firestoreWhere = where;
  window.firestoreOnSnapshot = onSnapshot;
  window.firebaseSignIn = signInWithEmailAndPassword;
  window.firebaseSignOut = signOut;
  window.firebaseOnAuthStateChanged = onAuthStateChanged;

  // Signal that Firebase is ready
  window.firebaseReady = true;
  window.dispatchEvent(new Event('firebase-ready'));
</script>

<style>
/* ============================================================
   RAGHAY LITAAMIR BTP — Design System
   ============================================================ */

:root[data-theme="dark"] {
  --bg-primary: #0F1419;
  --bg-secondary: #1A1F2E;
  --bg-tertiary: #242B3D;
  --bg-elevated: #2D3548;
  --border: #2D3548;
  --border-light: #3A435A;
  --text-primary: #F5F6FA;

  --blueprint-grid: rgba(255,107,0,0.04);
}

:root[data-theme="light"] {
  --bg-primary: #F5F6F8;
  --bg-secondary: #FFFFFF;
  --bg-tertiary: #F1F3F5;
  --bg-elevated: #FFFFFF;
  --border: #E1E5EA;
  --border-light: #CFD4DB;
  --text-primary: #1A1F2E;
  --text-secondary: #5D6578;
  --text-muted: #8B92A8;
  --shadow: 0 2px 12px rgba(15,20,25,0.08);
  --shadow-lg: 0 8px 32px rgba(15,20,25,0.12);
  --glow-orange: 0 0 20px rgba(255,107,0,0.25);
  --blueprint-grid: rgba(255,107,0,0.025);
}

:root {
  --accent: #FF6B00;
  --accent-hover: #FF8533;
  --accent-dark: #CC5500;
  --hazard: #FFC107;
  --hazard-dark: #FFA000;
  --success: #10B981;
  --warning: #F59E0B;
  --danger: #EF4444;
  --info: #3B82F6;
  --font-display: 'Bebas Neue', 'Arial Black', sans-serif;
  --font-body: 'Rubik', -apple-system, sans-serif;
  --font-mono: 'JetBrains Mono', 'Courier New', monospace;
  --radius-sm: 4px;
  --radius: 8px;
  --radius-lg: 12px;
  --sidebar-w: 260px;
  --header-h: 64px;
  --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
  font-family: var(--font-body);
  background: var(--bg-primary);
  color: var(--text-primary);
  font-size: 14px;
  line-height: 1.5;
  min-height: 100vh;
  overflow-x: hidden;
  transition: background var(--transition), color var(--transition);
  background-image: linear-gradient(var(--blueprint-grid) 1px, transparent 1px), linear-gradient(90deg, var(--blueprint-grid) 1px, transparent 1px);
  background-size: 40px 40px;
}
::selection { background: var(--accent); color: #fff; }
::-webkit-scrollbar { width: 10px; height: 10px; }
::-webkit-scrollbar-track { background: var(--bg-secondary); }
::-webkit-scrollbar-thumb { background: var(--border-light); border-radius: 5px; }
::-webkit-scrollbar-thumb:hover { background: var(--accent); }

/* LOGIN */
#loginScreen {
  position: fixed; inset: 0;
  display: flex; align-items: center; justify-content: center;
  background: var(--bg-primary);
  z-index: 1000; padding: 20px;
}
#loginScreen::before {
  content: '';
  position: absolute; inset: 0;
  background: radial-gradient(circle at 20% 50%, rgba(255,107,0,0.15), transparent 40%), radial-gradient(circle at 80% 80%, rgba(255,193,7,0.08), transparent 40%);
  pointer-events: none;
}
.hazard-stripe {
  height: 16px;
  background: repeating-linear-gradient(-45deg, #FFC107 0 24px, #1A1F2E 24px 48px);
  box-shadow: 0 2px 8px rgba(0,0,0,0.3);
}
.login-box {
  width: 100%; max-width: 440px;
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  overflow: hidden;
  box-shadow: var(--shadow-lg);
  position: relative; z-index: 1;
  animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
}
@keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
.login-header {
  padding: 40px 32px 24px;
  text-align: center;
  background: linear-gradient(135deg, var(--bg-tertiary) 0%, var(--bg-secondary) 100%);
  border-bottom: 1px solid var(--border);
}
.logo-mark {
  width: 72px; height: 72px;
  margin: 0 auto 16px;
  background: linear-gradient(135deg, var(--accent) 0%, var(--hazard) 100%);
  border-radius: var(--radius-lg);
  display: flex; align-items: center; justify-content: center;
  font-size: 36px;
  box-shadow: var(--glow-orange);
  transform: rotate(-3deg);
}
.brand-title { font-family: var(--font-display); font-size: 28px; letter-spacing: 2px; color: var(--text-primary); line-height: 1; margin-bottom: 4px; }
.brand-subtitle { font-size: 11px; letter-spacing: 3px; color: var(--accent); font-weight: 600; text-transform: uppercase; }
.login-body { padding: 32px; }
.form-group { margin-bottom: 18px; }
.form-label {
  display: block;
  font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase;
  color: var(--text-secondary); margin-bottom: 8px; font-weight: 600;
}
.form-control {
  width: 100%; padding: 12px 14px;
  background: var(--bg-primary);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text-primary);
  font-family: var(--font-body); font-size: 14px;
  transition: all var(--transition);
}
.form-control:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(255,107,0,0.15); }
.form-control::placeholder { color: var(--text-muted); }
select.form-control { cursor: pointer; }
textarea.form-control { resize: vertical; min-height: 80px; }
.btn {
  display: inline-flex; align-items: center; justify-content: center;
  gap: 8px; padding: 12px 20px;
  border: none; border-radius: var(--radius);
  font-family: var(--font-body); font-weight: 600; font-size: 13px; letter-spacing: 0.5px;
  cursor: pointer; transition: all var(--transition);
  text-transform: uppercase; white-space: nowrap;
}
.btn-primary { background: linear-gradient(135deg, var(--accent) 0%, var(--accent-dark) 100%); color: #fff; box-shadow: 0 4px 14px rgba(255,107,0,0.3); }
.btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(255,107,0,0.45); }
.btn-secondary { background: var(--bg-tertiary); color: var(--text-primary); border: 1px solid var(--border); }
.btn-secondary:hover { background: var(--bg-elevated); border-color: var(--accent); }
.btn-danger { background: var(--danger); color: #fff; }
.btn-danger:hover { background: #DC2626; transform: translateY(-1px); }
.btn-success { background: var(--success); color: #fff; }
.btn-sm { padding: 6px 12px; font-size: 11px; }
.btn-block { width: 100%; }
.login-footer { padding: 16px 32px; background: var(--bg-tertiary); border-top: 1px solid var(--border); font-size: 11px; color: var(--text-muted); text-align: center; letter-spacing: 0.5px; }
.login-hint {
  margin-top: 14px; padding: 10px 12px;
  background: rgba(255,107,0,0.08);
  border: 1px dashed rgba(255,107,0,0.3);
  border-radius: var(--radius);
  font-size: 11px; color: var(--text-secondary);
  font-family: var(--font-mono); line-height: 1.6;
}
.sync-status {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: 11px;
  padding: 4px 10px;
  background: rgba(16,185,129,0.15);
  border-radius: 20px;
  color: var(--success);
}
.sync-status.syncing { background: rgba(245,158,11,0.15); color: var(--warning); }
.sync-status.error { background: rgba(239,68,68,0.15); color: var(--danger); }

/* APP SHELL */
#app { display: none; min-height: 100vh; }
#app.active { display: block; }
.sidebar {
  position: fixed; left: 0; top: 0; bottom: 0;
  width: var(--sidebar-w);
  background: var(--bg-secondary);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  z-index: 100;
  transition: transform var(--transition);
}
.sidebar-header { padding: 20px 20px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; }
.sidebar-logo {
  width: 40px; height: 40px;
  background: linear-gradient(135deg, var(--accent), var(--hazard));
  border-radius: var(--radius);
  display: flex; align-items: center; justify-content: center;
  font-size: 20px; flex-shrink: 0;
  box-shadow: var(--glow-orange);
}
.sidebar-brand { font-family: var(--font-display); font-size: 18px; letter-spacing: 1.5px; line-height: 1; color: var(--text-primary); }
.sidebar-brand small { display: block; font-family: var(--font-body); font-size: 9px; letter-spacing: 2px; color: var(--accent); font-weight: 700; margin-top: 3px; }
.sidebar-nav { flex: 1; padding: 16px 12px; overflow-y: auto; }
.nav-section-title { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--text-muted); padding: 12px 12px 6px; font-weight: 700; }
.nav-item {
  display: flex; align-items: center; gap: 12px;
  padding: 11px 14px;
  color: var(--text-secondary);
  border-radius: var(--radius);
  cursor: pointer; font-size: 13px; font-weight: 500;
  transition: all var(--transition);
  margin-bottom: 2px;
  border-left: 3px solid transparent;
}
.nav-item:hover { background: var(--bg-tertiary); color: var(--text-primary); }
.nav-item.active {
  background: linear-gradient(90deg, rgba(255,107,0,0.15), transparent);
  color: var(--accent);
  border-left-color: var(--accent);
  font-weight: 600;
}
.nav-icon { font-size: 18px; width: 24px; text-align: center; }
.nav-badge { margin-left: auto; background: var(--accent); color: #fff; font-size: 10px; padding: 2px 7px; border-radius: 10px; font-weight: 700; }
.sidebar-footer { padding: 14px; border-top: 1px solid var(--border); background: var(--bg-tertiary); }
.user-chip { display: flex; align-items: center; gap: 10px; padding: 8px; border-radius: var(--radius); }
.user-avatar {
  width: 36px; height: 36px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--accent), var(--hazard));
  display: flex; align-items: center; justify-content: center;
  font-weight: 700; color: #fff; font-size: 14px; flex-shrink: 0;
}
.user-info { flex: 1; min-width: 0; }
.user-name { font-weight: 600; font-size: 13px; color: var(--text-primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.user-role { font-size: 10px; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; font-weight: 700; }

/* MAIN */
.main { margin-left: var(--sidebar-w); min-height: 100vh; display: flex; flex-direction: column; }
.topbar {
  height: var(--header-h);
  background: var(--bg-secondary);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center;
  padding: 0 24px; gap: 16px;
  position: sticky; top: 0; z-index: 50;
  backdrop-filter: blur(8px);
}
.topbar-title { font-family: var(--font-display); font-size: 24px; letter-spacing: 2px; flex: 1; display: flex; align-items: center; gap: 14px; }
.topbar-title::before { content: ''; width: 4px; height: 24px; background: var(--accent); border-radius: 2px; }
.topbar-actions { display: flex; align-items: center; gap: 10px; }
.icon-btn {
  width: 38px; height: 38px;
  border-radius: var(--radius);
  background: var(--bg-tertiary);
  border: 1px solid var(--border);
  color: var(--text-secondary);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px;
  transition: all var(--transition);
}
.icon-btn:hover { background: var(--accent); color: #fff; border-color: var(--accent); transform: translateY(-2px); }
.content { flex: 1; padding: 24px; max-width: 1600px; width: 100%; margin: 0 auto; }

/* CARDS */
.card { background: var(--bg-secondary); border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; margin-bottom: 20px; }
.card-header { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; gap: 12px; flex-wrap: wrap; }
.card-title { font-family: var(--font-display); font-size: 18px; letter-spacing: 1.5px; display: flex; align-items: center; gap: 10px; }
.card-body { padding: 20px; }
.card-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 16px; }
.toolbar { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; margin-bottom: 16px; }
.search-box { flex: 1; min-width: 200px; position: relative; }
.search-box input {
  width: 100%; padding: 10px 14px 10px 38px;
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text-primary);
  font-family: var(--font-body); font-size: 13px;
  transition: all var(--transition);
}
.search-box input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(255,107,0,0.15); }
.search-box::before { content: '🔍'; position: absolute; left: 12px; top: 50%; transform: translateY(-50%); font-size: 13px; opacity: 0.6; }
.data-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.data-table th {
  background: var(--bg-tertiary);
  padding: 12px 14px; text-align: left;
  font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase;
  color: var(--text-secondary); font-weight: 700;
  border-bottom: 2px solid var(--accent);
  white-space: nowrap;
}
.data-table td { padding: 12px 14px; border-bottom: 1px solid var(--border); color: var(--text-primary); vertical-align: middle; }
.data-table tbody tr { transition: background var(--transition); }
.data-table tbody tr:hover { background: var(--bg-tertiary); }
.data-table .actions { display: flex; gap: 6px; justify-content: flex-end; }
.action-btn {
  width: 30px; height: 30px;
  background: var(--bg-tertiary);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  cursor: pointer;
  display: inline-flex; align-items: center; justify-content: center;
  font-size: 13px;
  transition: all var(--transition);
  color: var(--text-secondary);
}
.action-btn:hover { background: var(--accent); color: #fff; border-color: var(--accent); transform: translateY(-1px); }
.action-btn.danger:hover { background: var(--danger); border-color: var(--danger); }
.table-wrap { overflow-x: auto; border-radius: var(--radius-lg); }

/* BADGES */
.badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 10px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; border: 1px solid transparent; }
.badge-success { background: rgba(16,185,129,0.15); color: var(--success); border-color: rgba(16,185,129,0.3); }
.badge-warning { background: rgba(245,158,11,0.15); color: var(--warning); border-color: rgba(245,158,11,0.3); }
.badge-danger  { background: rgba(239,68,68,0.15); color: var(--danger); border-color: rgba(239,68,68,0.3); }
.badge-info    { background: rgba(59,130,246,0.15); color: var(--info); border-color: rgba(59,130,246,0.3); }
.badge-accent  { background: rgba(255,107,0,0.15); color: var(--accent); border-color: rgba(255,107,0,0.3); }
.badge-neutral { background: var(--bg-tertiary); color: var(--text-secondary); border-color: var(--border); }

/* PROGRESS */
.progress { height: 8px; background: var(--bg-tertiary); border-radius: 4px; overflow: hidden; position: relative; }
.progress-bar { height: 100%; background: linear-gradient(90deg, var(--accent), var(--hazard)); transition: width 0.6s cubic-bezier(0.16, 1, 0.3, 1); border-radius: 4px; }

/* EMPTY */
.empty { text-align: center; padding: 60px 20px; color: var(--text-muted); }
.empty-icon { font-size: 56px; opacity: 0.4; margin-bottom: 12px; }
.empty-title { font-family: var(--font-display); font-size: 20px; letter-spacing: 1.5px; color: var(--text-secondary); margin-bottom: 6px; }

/* MODAL */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(6px);
  display: none;
  align-items: center; justify-content: center;
  z-index: 200; padding: 20px;
  animation: fadeIn 0.2s;
}
.modal-overlay.active { display: flex; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
.modal {
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  width: 100%; max-width: 640px;
  max-height: 90vh;
  display: flex; flex-direction: column;
  box-shadow: var(--shadow-lg);
  animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1);
  overflow: hidden;
}
.modal-lg { max-width: 900px; }
.modal-xl { max-width: 1100px; }
.modal-header { padding: 18px 22px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; background: linear-gradient(135deg, var(--bg-tertiary), var(--bg-secondary)); }
.modal-title { font-family: var(--font-display); font-size: 20px; letter-spacing: 1.5px; }
.modal-close { width: 32px; height: 32px; border-radius: var(--radius-sm); background: transparent; border: none; cursor: pointer; color: var(--text-secondary); font-size: 20px; transition: all var(--transition); }
.modal-close:hover { background: var(--danger); color: #fff; }
.modal-body { padding: 22px; overflow-y: auto; flex: 1; }
.modal-footer { padding: 14px 22px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 10px; background: var(--bg-tertiary); }
.form-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 14px; }

/* TOAST */
#toastContainer { position: fixed; bottom: 24px; right: 24px; z-index: 500; display: flex; flex-direction: column; gap: 10px; pointer-events: none; }
.toast {
  min-width: 280px; max-width: 380px;
  padding: 14px 18px;
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  border-left: 4px solid var(--accent);
  border-radius: var(--radius);
  box-shadow: var(--shadow-lg);
  color: var(--text-primary);
  font-size: 13px;
  animation: slideInRight 0.35s cubic-bezier(0.16, 1, 0.3, 1);
  pointer-events: all;
  display: flex; align-items: center; gap: 12px;
}
.toast.success { border-left-color: var(--success); }
.toast.error   { border-left-color: var(--danger); }
.toast.warning { border-left-color: var(--warning); }
.toast-icon { font-size: 20px; }
@keyframes slideInRight { from { transform: translateX(120%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

/* KPI */
.kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 16px; margin-bottom: 24px; }
.kpi-card {
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 20px;
  position: relative; overflow: hidden;
  transition: all var(--transition);
}
.kpi-card::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 4px; background: var(--accent); }
.kpi-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-lg); border-color: var(--accent); }
.kpi-card.success::before { background: var(--success); }
.kpi-card.warning::before { background: var(--warning); }
.kpi-card.danger::before { background: var(--danger); }
.kpi-card.info::before { background: var(--info); }
.kpi-label { font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--text-secondary); font-weight: 600; margin-bottom: 8px; }
.kpi-value { font-family: var(--font-display); font-size: 36px; letter-spacing: 1px; line-height: 1; color: var(--text-primary); margin-bottom: 6px; }

.kpi-icon { position: absolute; right: 16px; top: 16px; font-size: 28px; opacity: 0.25; }

/* PAGE HEADER */

/* RESPONSIVE */

}
.mobile-toggle { display: none; }
@media (max-width: 900px) { .mobile-toggle { display: flex; } }

/* PRINT */

  body { background: #fff !important; }
  .sidebar, .topbar, .no-print, #toastContainer { display: none !important; }
  .main { margin-left: 0; }

}

<script>
/* ============================================================
   RAGHAY LITAAMIR BTP — Firestore Integration
   ============================================================ */

let firebaseReady = false;
let db, auth, collection, docRef, getDocs, getDoc, setDoc, updateDoc, deleteDoc;

// Données par défaut
const DEFAULT_DATA = {
  chantiers: [
    { id: "1", code: 'CH-2026-001', nom: 'Construction École Privée - Casablanca', client: 'Ministère Éducation', adresse: 'Bd Zerktouni, Casablanca', gps: '33.5731,-7.5898', budget: 100000, avancement: 35, dateDebut: '2026-01-15', dateFin: '2026-06-30', status: 'en_cours', chefChantier: 'Said Bennani' },
    { id: "2", code: 'CH-2026-002', nom: 'Villa Palmeraie - Marrakech', client: 'Particulier - M. Tazi', adresse: 'Palmeraie, Marrakech', gps: '31.6295,-7.9811', budget: 2800000, avancement: 30, dateDebut: '2026-02-20', dateFin: '2026-11-15', status: 'en_cours', chefChantier: 'Loukrimi Hassan' },
    { id: "3", code: 'CH-2026-003', nom: 'Pont routier RN1 - Rabat', client: 'Ministère Équipement', adresse: 'RN1 km 45, Rabat', gps: '34.0209,-6.8416', budget: 12000000, avancement: 10, dateDebut: '2026-03-01', dateFin: '2027-06-30', status: 'en_cours', chefChantier: 'Dahbi Youssef' }
  ],
  personnel: [
    { id: "1", matricule: 'LIT-001', nom: 'Said Bennani', poste: 'Chef de chantier', telephone: '0661234567', chantier: "1", tauxHoraire: 85 },
    { id: "2", matricule: 'LIT-002', nom: 'Loukrimi Hassan', poste: 'Chef de chantier', telephone: '0662345678', chantier: "2", tauxHoraire: 80 },
    { id: "3", matricule: 'LIT-003', nom: 'Dahbi Youssef', poste: 'Chef de chantier', telephone: '0663456789', chantier: "3", tauxHoraire: 90 },
    { id: "4", matricule: 'LIT-004', nom: 'Oumjoud Karim', poste: 'Maçon qualifié', telephone: '0664567890', chantier: "1", tauxHoraire: 45 },
    { id: "5", matricule: 'LIT-005', nom: 'Amine Rachidi', poste: 'Conducteur engin', telephone: '0665678901', chantier: "3", tauxHoraire: 60 }
  ],
  materiel: [
    { id: "1", code: 'ENG-001', nom: 'Pelle hydraulique CAT 320', type: 'Engin TP', chantier: "3", status: 'operationnel', valeur: 850000 },
    { id: "2", code: 'ENG-002', nom: 'Bétonnière 350L', type: 'Bétonnage', chantier: "1", status: 'operationnel', valeur: 45000 }
  ],
  stock: [

    { id: "2", code: 'MAT-FER-001', designation: 'Fer à béton Ø12', categorie: 'Aciers', unite: 'barre', quantite: 280, seuilAlerte: 50, prixUnitaire: 95 }
  ],

  consoCarburant: [],

};

let appState = {
  chantiers: [],
  personnel: [],
  materiel: [],
  stock: [],
  consoHeures: [],
  consoCarburant: [],
  consoMateriaux: []
};

let currentUser = null;
let currentModule = 'dashboard';
let editingId = null;

// Utilitaires
function fmt(n) { return new Intl.NumberFormat('fr-FR').format(n || 0); }
function fmtMAD(n) { return fmt(n) + ' MAD'; }
function fmtDate(d) { if (!d) return '—'; return new Date(d).toLocaleDateString('fr-FR'); }
function escapeHtml(s) {
  if (s == null) return '';
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function toast(msg, type='success') {
  const icons = { success: '✅', error: '❌', warning: '⚠️', info: 'ℹ️' };
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.innerHTML = `<span class="toast-icon">${icons[type]||'ℹ️'}</span><span>${msg}</span>`;
  document.getElementById('toastContainer').appendChild(el);
  setTimeout(() => { el.style.opacity = '0'; el.style.transform = 'translateX(120%)'; }, 3000);
  setTimeout(() => el.remove(), 3400);
}
function openModal(title, bodyHtml, footerHtml, size='') {
  document.getElementById('modalTitle').textContent = title;
  document.getElementById('modalBody').innerHTML = bodyHtml;
  document.getElementById('modalFooter').innerHTML = footerHtml || `<button class="btn btn-secondary" onclick="window.closeModal()">Fermer</button>`;
  const m = document.getElementById('modal');
  m.classList.remove('modal-lg','modal-xl');
  if (size) m.classList.add(size);
  document.getElementById('modalOverlay').classList.add('active');
}
function closeModal() { document.getElementById('modalOverlay').classList.remove('active'); editingId = null; }
window.closeModal = closeModal;
function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); }
window.toggleSidebar = toggleSidebar;

// Rôles
const ROLES = {
  super_admin: { label: 'Super Admin', modules: ['dashboard','chantiers','personnel','materiel','stock'] },
  direction: { label: 'Direction', modules: ['dashboard','chantiers','personnel','materiel','stock'] },
  chef_chantier: { label: 'Chef de chantier', modules: ['dashboard','chantiers','personnel','materiel'] },
  magasinier: { label: 'Magasinier', modules: ['dashboard','stock'] },
  ouvrier: { label: 'Ouvrier', modules: ['dashboard'] }
};

const MODULES_DEF = [
  { id: 'dashboard', label: 'Tableau de bord', icon: '📊' },
  { id: 'chantiers', label: 'Chantiers', icon: '🏗️' },
  { id: 'personnel', label: 'Personnel', icon: '👷' },
  { id: 'materiel', label: 'Matériel', icon: '🚜' },
  { id: 'stock', label: 'Stock', icon: '📦' }
];

function canAccess(moduleId) { return currentUser && ROLES[currentUser.role]?.modules.includes(moduleId); }

// ========== FIRESTORE FUNCTIONS ==========
async function loadCollection(collectionName) {
  if (!firebaseReady || !db) return [];
  try {
    const querySnapshot = await getDocs(collection(db, collectionName));
    const items = [];
    querySnapshot.forEach((doc) => {
      items.push({ id: doc.id, ...doc.data() });
    });
    appState[collectionName] = items;
    return items;
  } catch (error) {
    console.error(`Error loading ${collectionName}:`, error);
    return [];
  }
}

async function saveToFirestore(collectionName, data, id = null) {
  if (!firebaseReady || !db) return false;
  try {
    const docId = id || data.id || Date.now().toString();
    await setDoc(docRef(db, collectionName, docId), { ...data, id: docId });
    await loadCollection(collectionName);
    return true;
  } catch (error) {
    console.error(`Error saving to ${collectionName}:`, error);
    toast(`Erreur sauvegarde: ${error.message}`, 'error');
    return false;
  }
}

async function deleteFromFirestore(collectionName, id) {
  if (!firebaseReady || !db) return false;
  try {
    await deleteDoc(docRef(db, collectionName, id));
    await loadCollection(collectionName);
    return true;
  } catch (error) {
    console.error(`Error deleting from ${collectionName}:`, error);
    return false;
  }
}

async function loadAllData() {
  await loadCollection('chantiers');
  await loadCollection('personnel');
  await loadCollection('materiel');
  await loadCollection('stock');
  await loadCollection('consoHeures');
  await loadCollection('consoCarburant');
  await loadCollection('consoMateriaux');
  
  // Vérifier si les collections sont vides et les initialiser
  if (appState.chantiers.length === 0) {
    for (let item of DEFAULT_DATA.chantiers) {
      await saveToFirestore('chantiers', item, item.id);
    }
  }
  if (appState.personnel.length === 0) {
    for (let item of DEFAULT_DATA.personnel) {
      await saveToFirestore('personnel', item, item.id);
    }
  }
  if (appState.materiel.length === 0) {
    for (let item of DEFAULT_DATA.materiel) {
      await saveToFirestore('materiel', item, item.id);
    }
  }
  if (appState.stock.length === 0) {
    for (let item of DEFAULT_DATA.stock) {
      await saveToFirestore('stock', item, item.id);
    }
  }
}

// Calculs budgétaires
function calculerCoutReelChantier(chantierId) {
  const coutHROuvriers = (appState.consoHeures || []).filter(c => c.chantierId === chantierId).reduce((sum, c) => sum + (c.cout || 0), 0);
  const coutCarburant = (appState.consoCarburant || []).filter(c => c.chantierId === chantierId).reduce((sum, c) => sum + (c.cout || 0), 0);
  const coutMateriaux = (appState.consoMateriaux || []).filter(c => c.chantierId === chantierId).reduce((sum, c) => sum + (c.cout || 0), 0);
  return { mainOeuvre: coutHROuvriers, carburant: coutCarburant, materiaux: coutMateriaux, total: coutHROuvriers + coutCarburant + coutMateriaux };
}

function getBudgetStatus(chantier) {
  const coutReel = calculerCoutReelChantier(chantier.id);
  const pourcentage = chantier.budget > 0 ? (coutReel.total / chantier.budget) * 100 : 0;
  let status = 'ok', message = '';
  if (pourcentage >= 95) { status = 'danger'; message = `⚠️ ${pourcentage.toFixed(1)}% du budget consommé !`; }
  else if (pourcentage >= 80) { status = 'warning'; message = `⚠️ ${pourcentage.toFixed(1)}% consommé`; }
  else { message = `✅ ${pourcentage.toFixed(1)}% consommé`; }
  return { ...coutReel, pourcentage, status, message };
}

// Navigation
function renderSidebar() {
  const nav = document.getElementById('sidebarNav');
  if (!currentUser) return;
  const allowed = ROLES[currentUser.role]?.modules || [];
  let html = '<div class="nav-section-title">Modules</div>';
  MODULES_DEF.filter(m => allowed.includes(m.id)).forEach(m => {
    html += `<div class="nav-item ${m.id === currentModule ? 'active' : ''}" onclick="window.navigate('${m.id}')">
      <span class="nav-icon">${m.icon}</span><span>${m.label}</span>
    </div>`;
  });
  nav.innerHTML = html;
}

async function navigate(moduleId) {
  if (!canAccess(moduleId)) { toast('Accès refusé', 'error'); return; }
  currentModule = moduleId;
  const mod = MODULES_DEF.find(m => m.id === moduleId);
  document.getElementById('topbarTitle').textContent = mod.label.toUpperCase();
  renderSidebar();
  if (window.innerWidth < 900) document.getElementById('sidebar').classList.remove('toggle');
  
  if (moduleId === 'dashboard') {
    const chantiersActifs = appState.chantiers.filter(c => c.status === 'en_cours');
    let budgetTotal = 0, consommeTotal = 0;
    chantiersActifs.forEach(c => { const s = getBudgetStatus(c); budgetTotal += c.budget; consommeTotal += s.total; });
    
    document.getElementById('content').innerHTML = `
      <div class="page-header"><div><h1 class="page-title-main">Tableau de bord</h1><div class="page-subtitle">Firestore · ${new Date().toLocaleDateString('fr-FR')}</div></div></div>
      <div class="kpi-grid">
        <div class="kpi-card"><div class="kpi-icon">🏗️</div><div class="kpi-label">Chantiers actifs</div><div class="kpi-value">${chantiersActifs.length}</div></div>
        <div class="kpi-card"><div class="kpi-icon">👷</div><div class="kpi-label">Personnel</div><div class="kpi-value">${appState.personnel.length}</div></div>
        <div class="kpi-card ${budgetTotal > 0 && consommeTotal/budgetTotal >= 0.95 ? 'danger' : (budgetTotal > 0 && consommeTotal/budgetTotal >= 0.8 ? 'warning' : 'info')}">
          <div class="kpi-icon">💰</div><div class="kpi-label">Budget consommé</div><div class="kpi-value">${budgetTotal > 0 ? ((consommeTotal/budgetTotal)*100).toFixed(0) : 0}%</div>
        </div>
      </div>
      <div class="card"><div class="card-header"><div class="card-title">🏗️ Suivi budgétaire des chantiers</div></div><div class="card-body">
        ${chantiersActifs.map(c => { const s = getBudgetStatus(c); return `<div style="padding:12px; border:1px solid var(--border); border-radius:8px; margin-bottom:10px;">
          <div class="flex justify-between"><strong>${escapeHtml(c.nom)}</strong><span>${s.pourcentage.toFixed(1)}%</span></div>
          <div class="text-sm">Budget: ${fmtMAD(c.budget)} | Consommé: ${fmtMAD(s.total)}</div>
          <div class="progress mt-2"><div class="progress-bar" style="width:${Math.min(100, s.pourcentage)}%; background:${s.pourcentage>=95?'#EF4444':(s.pourcentage>=80?'#F59E0B':'#10B981')}"></div></div>
          <div class="text-xs ${s.status === 'danger' ? 'text-danger' : (s.status === 'warning' ? 'text-warning' : 'text-success')} mt-1">${s.message}</div>
          <button class="btn btn-secondary btn-sm mt-2" onclick="window.openBudgetModal('${c.id}')">💰 Ajouter consommation</button>
        </div>`; }).join('')}
      </div></div>`;
  } else if (moduleId === 'chantiers') {
    document.getElementById('content').innerHTML = `
      <div class="page-header"><div><h1 class="page-title-main">Chantiers</h1></div></div>
      <div class="card-grid">${appState.chantiers.map(c => { const s = getBudgetStatus(c); return `<div class="card"><div style="padding:16px"><h3>${escapeHtml(c.nom)}</h3><div>Budget: ${fmtMAD(c.budget)}</div><div>Avancement: ${c.avancement}%</div><div class="progress mt-2"><div class="progress-bar" style="width:${c.avancement}%"></div></div><div class="mt-2 ${s.status === 'danger' ? 'text-danger' : (s.status === 'warning' ? 'text-warning' : 'text-success')}">${s.message}</div></div></div>`; }).join('')}</div>`;
  } else if (moduleId === 'stock') {
    document.getElementById('content').innerHTML = `<div class="page-header"><div><h1 class="page-title-main">Stock</h1></div></div><div class="card-grid">${appState.stock.map(s => `<div class="card"><div style="padding:16px"><h3>${escapeHtml(s.designation)}</h3><div>Quantité: ${s.quantite} ${s.unite}</div><div>Prix: ${fmtMAD(s.prixUnitaire)}</div><div class="${s.quantite <= s.seuilAlerte ? 'text-danger' : 'text-success'}">Seuil: ${s.seuilAlerte}</div></div></div>`).join('')}</div>`;
  } else {
    document.getElementById('content').innerHTML = `<div class="empty"><div class="empty-icon">🚧</div><div class="empty-title">Module: ${mod.label}</div><div class="text-muted mt-2">Données synchronisées avec Firestore</div></div>`;
  }
}
window.navigate = navigate;

// Ajout de consommation
async function addConsommation(chantierId, type, data) {
  const newId = Date.now().toString();
  let collectionName = '';
  let consommation = { id: newId, chantierId, ...data, date: new Date().toISOString().slice(0,10) };
  
  if (type === 'heures') {
    const personnel = appState.personnel.find(p => p.id === data.personnelId);
    consommation.cout = (data.heures || 0) * (personnel?.tauxHoraire || 0);
    collectionName = 'consoHeures';
  } else if (type === 'carburant') {
    consommation.cout = (data.litres || 0) * (data.prixLitre || 15);
    collectionName = 'consoCarburant';
  } else if (type === 'materiaux') {
    const article = appState.stock.find(s => s.id === data.articleId);
    if (article && data.quantite > article.quantite) { toast('Stock insuffisant', 'error'); return false; }
    consommation.cout = (data.quantite || 0) * (article?.prixUnitaire || 0);
    collectionName = 'consoMateriaux';
    if (article) article.quantite -= data.quantite;
    await saveToFirestore('stock', article, article.id);
  }
  
  await saveToFirestore(collectionName, consommation, newId);
  toast(`Consommation ajoutée: ${fmtMAD(consommation.cout)}`, 'success');
  
  // Vérifier l'alerte budget
  const chantier = appState.chantiers.find(c => c.id === chantierId);
  if (chantier) {
    const status = getBudgetStatus(chantier);
    if (status.pourcentage >= 95) {
      toast(`⚠️ ATTENTION: ${chantier.nom} - ${status.message}`, 'warning');
    }
  }
  await navigate('dashboard');
  return true;
}

window.openBudgetModal = (chantierId) => {
  const chantier = appState.chantiers.find(c => c.id === chantierId);
  const status = getBudgetStatus(chantier);
  const personnelChantier = appState.personnel.filter(p => p.chantier === chantierId);
  const enginsChantier = appState.materiel.filter(m => m.chantier === chantierId);
  
  const body = `
    <div class="mb-4"><h3>${escapeHtml(chantier?.nom)}</h3><div>Budget: ${fmtMAD(chantier?.budget)} | Consommé: ${fmtMAD(status.total)} | ${status.message}</div></div>
    <div class="form-group"><label class="form-label">👷 Ajouter heures main d'œuvre</label>
      <select class="form-control" id="selectPersonnel"><option value="">-- Sélectionner --</option>${personnelChantier.map(p => `<option value="${p.id}" data-taux="${p.tauxHoraire}">${escapeHtml(p.nom)} (${fmtMAD(p.tauxHoraire)}/h)</option>`).join('')}</select>
      <div class="form-row mt-2"><input type="number" id="heuresInput" class="form-control" placeholder="Heures"><button class="btn btn-primary btn-sm" onclick="window.addHeures('${chantierId}')">Ajouter</button></div>
    </div>
    <div class="form-group"><label class="form-label">⛽ Ajouter carburant</label>
      <select class="form-control" id="selectEngin"><option value="">-- Sélectionner --</option>${enginsChantier.map(e => `<option value="${e.id}">${escapeHtml(e.nom)}</option>`).join('')}</select>
      <div class="form-row mt-2"><input type="number" id="litresInput" class="form-control" placeholder="Litres"><input type="number" id="prixInput" class="form-control" placeholder="Prix/L" value="15"><button class="btn btn-primary btn-sm" onclick="window.addCarburant('${chantierId}')">Ajouter</button></div>
    </div>
    <div class="form-group"><label class="form-label">📦 Ajouter matériaux</label>
      <select class="form-control" id="selectArticle"><option value="">-- Sélectionner --</option>${appState.stock.map(a => `<option value="${a.id}" data-prix="${a.prixUnitaire}">${escapeHtml(a.designation)} (Stock: ${a.quantite} ${a.unite})</option>`).join('')}</select>
      <div class="form-row mt-2"><input type="number" id="qteInput" class="form-control" placeholder="Quantité"><button class="btn btn-primary btn-sm" onclick="window.addMateriaux('${chantierId}')">Ajouter</button></div>
    </div>
  `;
  openModal(`Suivi budgétaire - ${chantier?.code}`, body, `<button class="btn btn-secondary" onclick="window.closeModal()">Fermer</button>`, 'modal-lg');
};

window.addHeures = async (chantierId) => {
  const personnelId = document.getElementById('selectPersonnel')?.value;
  const heures = parseFloat(document.getElementById('heuresInput')?.value);
  if (!personnelId || !heures) { toast('Veuillez remplir tous les champs', 'error'); return; }
  await addConsommation(chantierId, 'heures', { personnelId, heures });
  closeModal();
};

window.addCarburant = async (chantierId) => {
  const enginId = document.getElementById('selectEngin')?.value;
  const litres = parseFloat(document.getElementById('litresInput')?.value);
  const prixLitre = parseFloat(document.getElementById('prixInput')?.value);
  if (!enginId || !litres) { toast('Veuillez remplir tous les champs', 'error'); return; }
  await addConsommation(chantierId, 'carburant', { enginId, litres, prixLitre });
  closeModal();
};

window.addMateriaux = async (chantierId) => {
  const articleId = document.getElementById('selectArticle')?.value;
  const quantite = parseFloat(document.getElementById('qteInput')?.value);
  if (!articleId || !quantite) { toast('Veuillez remplir tous les champs', 'error'); return; }
  await addConsommation(chantierId, 'materiaux', { articleId, quantite });
  closeModal();
};

// Authentification
async function loginWithFirebase(email, password) {
  if (!firebaseReady) { toast('Firebase non prêt', 'error'); return false; }
  try {
    const userCredential = await window.firebaseSignIn(auth, email, password);
    await loadAllData();
    currentUser = { id: userCredential.user.uid, email: email, fullName: email.split('@')[0], role: 'direction' };
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('app').classList.add('active');
    document.getElementById('userAvatar').textContent = currentUser.fullName.charAt(0).toUpperCase();
    document.getElementById('userName').textContent = currentUser.fullName;
    document.getElementById('userRole').textContent = 'Direction';
    renderSidebar();
    navigate('dashboard');
    toast(`Bienvenue ${currentUser.fullName}`, 'success');
    return true;
  } catch (error) {
    toast('Email ou mot de passe incorrect', 'error');
    return false;
  }
}

async function logout() {
  if (firebaseReady) await window.firebaseSignOut(auth);
  currentUser = null;
  document.getElementById('app').classList.remove('active');
  document.getElementById('loginScreen').style.display = 'flex';
}
window.logout = logout;
window.exportAll = () => {
  const blob = new Blob([JSON.stringify(appState, null, 2)], {type: 'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `raghay_backup_${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  toast('Données exportées', 'success');
};

// Thème
function setTheme(theme) {
  document.documentElement.setAttribute('data-theme', theme);
  localStorage.setItem('theme', theme);
  const btn = document.getElementById('themeToggle');
  if (btn) btn.textContent = theme === 'dark' ? '☀️' : '🌙';
}
document.getElementById('themeToggle')?.addEventListener('click', () => {
  const current = document.documentElement.getAttribute('data-theme') || 'dark';
  setTheme(current === 'dark' ? 'light' : 'dark');
});

// Login form
document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const email = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPassword').value;
  await loginWithFirebase(email, password);
});

// Initialisation
window.addEventListener('firebase-ready', () => {
  firebaseReady = true;
  db = window.firestore;
  auth = window.firebaseAuth;
  collection = window.firestoreCollection;
  docRef = window.firestoreDoc;
  getDocs = window.firestoreGetDocs;
  getDoc = window.firestoreGetDoc;
  setDoc = window.firestoreSetDoc;
  updateDoc = window.firestoreUpdateDoc;
  deleteDoc = window.firestoreDeleteDoc;
  document.getElementById('syncStatusMsg').innerHTML = '✅ Firestore connecté !';
  const savedTheme = localStorage.getItem('theme') || 'dark';
  setTheme(savedTheme);
});

// Exposer les fonctions globales
window.addHeures = addHeures;
window.addCarburant = addCarburant;
window.addMateriaux = addMateriaux;
window.openBudgetModal = openBudgetModal;
window.calculerCoutReelChantier = calculerCoutReelChantier;
window.getBudgetStatus = getBudgetStatus;
</script>
